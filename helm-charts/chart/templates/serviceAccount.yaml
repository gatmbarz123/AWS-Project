{{- if .Values.serviceAccount }}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.name }}-sa
  annotations:
    {{- $partition := ternary "aws-us-gov" "aws" (hasPrefix "us-gov-" .Values.global.region) }}
    eks.amazonaws.com/role-arn: "arn:{{ $partition }}:iam::{{ .Values.global.account }}:role/{{ .Values.global.short_environment }}-{{ .Values.global.short_region }}-{{ .Values.clusterPrefixName }}-{{ .Values.name }}"
{{- end }}
{{- end }}