{{- if .Values.job }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.name }}
  {{- if .Values.job.annotations }}
  annotations:
    {{- range $key, $value := .Values.job.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
spec:
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished | default 100 }}
  template:
    {{- if .Values.job.podTemplate }}
    metadata:
      {{- if .Values.job.podTemplate.labels }}
      labels:
        {{- toYaml .Values.job.podTemplate.labels | nindent 8 }}
      {{- end }}
      {{- if .Values.job.podTemplate.annotations }}
      annotations:
        {{- toYaml .Values.job.podTemplate.annotations | nindent 8 }}
      {{- end }}
    {{- end }}
    spec:
      containers:
      - name: {{ .Values.name }}
        image: {{ .Values.global.repo }}/{{ .Values.job.image.name }}:{{ .Values.job.image.tag }}
        imagePullPolicy: IfNotPresent
        command:
          {{- toYaml .Values.job.command | nindent 10 }}
        args:
          {{- toYaml .Values.job.args | nindent 10 }}
        envFrom:
        {{- if hasKey .Values "config" }}
        - configMapRef:
            name: '{{ .Values.name }}-configmap'
        {{- end }}
        {{- if hasKey .Values "secrets" }}
        - secretRef:
            name: '{{ .Values.name }}-secret'
        {{- end }}
        env:
        {{- if hasKey .Values "additionalEnvs" }}
        {{- range .Values.additionalEnvs }}
        - name: {{ .name }}
          value: {{ .value }}
        {{- end }}
        {{- end }}
        {{- if hasKey .Values "resources" }}
        resources:
          requests:
            cpu:    {{ .Values.resources.requests.cpu | default "100m" }}
            memory: {{ .Values.resources.requests.memory | default "256Mi" }}
          limits:
            cpu:    {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
        {{- end }}
      restartPolicy: Never
  backoffLimit: 2
{{- end }}