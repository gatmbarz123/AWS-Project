global:
  environment: dev
  short_environment: dev
  region: eu-central-1
  short_region: euc1
  repo: "example.repo"
  certificate: ""
  example_private_hostname: dev.example.com
  example_public_hostname: example.com
  account: "123456789012"

name: "web"

deployment:
  enabled: true
  image:
    tag: "1.0.0"
  replicas: 1
  deploymentStrategy: RollingUpdate
  maxSurge: 25%
  maxUnavailable: 25%

serviceAccount:
  create: true

service:
  enabled: true

config:
  bobo: "true"

secrets:
  data:
    - secretKey: "credentials"
      remoteRef:
        key: "Application/example/default-secret"
        property: "credentials"

ingress:
  enabled: true
  internet: true

pdb:
  enabled: true
  minAvailable: 1

