name: python-ai-non-gpu

clusterPrefixName: python-ai-eks

deployment:
  enabled: true
  image:
    name: python-ai
    tag: 'staging_9d1cfe7'
  replicas: 4
  deploymentStrategy: RollingUpdate
  maxSurge: 25%
  maxUnavailable: 25%
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    admission.datadoghq.com/enabled: "false"
    tags.datadoghq.com/service: python-ai-non-gpu
    tags.datadoghq.com/project: python-ai
    tags.datadoghq.com/team: algo
    tags.datadoghq.com/env: gov-dev
  podAnnotations:
    ad.datadoghq.com/python-ai-non-gpu.logs: '[{"source":"python-ai", "service":"python-ai-non-gpu", "tags":["env:gov-dev","project:python-ai","team:algo"]}]'

# command: sleep 3000
# autoscaling:
#   minReplicas: 1
#   maxReplicas: 2

serviceAccount:
  create: false

service:
  enabled: true
  targetPort: 80

config:
  data:
    AI_LOG_LEVEL: "DEBUG"
    S3_BUCKET: "dev-usgw1-example-projects"
    S3_REGION: "us-gov-west-1"
    APP_VERSION: "2.6.0"

secrets:
  storeKind: ClusterSecretStore
  storeName: applications-cluster-store
  template:
    AWS_ACCESS_KEY_ID: "{{ .s3_access_key }}"
    AWS_SECRET_ACCESS_KEY: "{{ .s3_secret }}"
  data:
    - secretKey: s3_access_key
      remoteRef:
        key: "Application/example/default-secret"
        property: "S3_ACCESS_KEY"
    - secretKey: s3_secret
      remoteRef:
        key: "Application/example/default-secret"
        property: "S3_SECRET"   

ingress:
  enabled: true
  groupName: dev-usgw1-ai-non-gpu-eks-private
  internet: false
  annotations:
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=360
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-FIPS-PQ-2025-09
    alb.ingress.kubernetes.io/wafv2-acl-arn: "arn:aws-us-gov:wafv2:us-gov-west-1:123456789012:regional/webacl/dev-usgw1-waf-acl-regional/00000000-0000-0000-0000-000000000000"

resources:
  limits:
    memory: "128Gi"
    cpu: "32"
  requests:
    memory: "128Gi"
    cpu: "32"
    
nodeSelector:
  karpenter.k8s.aws/instance-family: "m6i"

tolerations:
  - key: workload-type
    value: worker
    operator: Equal
    effect: NoSchedule
  
