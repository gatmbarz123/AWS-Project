default:
  requirements:
    - key: karpenter.k8s.aws/instance-category
      operator: In
      values:
      - t
      - c
      - r
    - key: karpenter.k8s.aws/instance-size
      operator: In
      values:
      - medium
      - large
      - xlarge
      - 2xlarge
    - key: "karpenter.sh/capacity-type"
      operator: In
      values:
      - "on-demand"
    - key: "topology.kubernetes.io/zone"
      operator: In
      values:
      - "us-gov-west-1a"
    - key: "kubernetes.io/arch"
      operator: In
      values:
      - "amd64"
    - key: "kubernetes.io/os"
      operator: In
      values:
      - "linux"
