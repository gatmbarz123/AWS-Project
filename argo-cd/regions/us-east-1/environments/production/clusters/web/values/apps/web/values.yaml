name: web
clusterPrefixName: web-eks
deployment:
  enabled: true
  image:
    tag: 'main_257dfe3'
  replicas: 1
  deploymentStrategy: RollingUpdate
  maxSurge: 25%
  maxUnavailable: 25%
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    admission.datadoghq.com/enabled: "false"
    tags.datadoghq.com/service: web
    tags.datadoghq.com/project: web
    tags.datadoghq.com/team: software
    tags.datadoghq.com/env: prod
  podAnnotations:
    ad.datadoghq.com/web.logs: '[{"source":"elixir", "service":"web", "tags":["env:prod","project:web","team:software"]}]'
# autoscaling:
#   minReplicas: 1
#   maxReplicas: 2
serviceAccount:
  create: true
service:
  enabled: true
  targetPort: 4000
config:
  data:
    PHX_HOST: "web.use1.example.com"
    S3_BUCKET: "prod-use1-example-projects"
    S3_REGION: "us-east-1"
    AWS_USE_FIPS_ENDPOINT: "true"
    AWS_MAILER_ENDPOINT: https://email-fips.us-east-1.amazonaws.com
    AWS_MAILER_FROM: "user@example.com"
    NOTIFICATION_ADDRESS: "user@example.com"
    PYTHON_AI_NODE_ENDPOINT_URL: "https://python-ai-non-gpu.prod.use1.example.com"
    DEFAULT_PROGRAMMER_ID: "8"
    DEFAULT_FEEDBACK_USER_EMAIL: "user@example.com"
    CAM_ANALYTICS_ENABLED: "true"
    CAM_ANALYTICS_EMAILS: "user@example.com"
    CAM_ANALYTICS_REPORTING_INTERVAL: "3600000"
    AIRTABLE_BASE: "example-airtable-base"
secrets:
  storeKind: ClusterSecretStore
  storeName: applications-cluster-store
  template:
    SECRET_KEY_BASE: "{{ .keyBase }}"
    DATABASE_URL: "ecto://{{ .username }}:{{ .password | urlquery }}@{{ .rdsWriterEndpoint }}/datacore"
    S3_ACCESS_KEY_ID: "{{ .s3_access_key }}"
    S3_SECRET_ACCESS_KEY: "{{ .s3_secret }}"
    AIRTABLE_API_KEY: "{{ .airtable_key }}"
  data:
    - secretKey: airtable_key
      remoteRef:
        key: "Application/example/default-secret"
        property: "AIRTABLE_KEY"
    - secretKey: keyBase
      remoteRef:
        key: "Application/example/default-secret"
        property: "SECRET_KEY_BASE"
    - secretKey: rdsWriterEndpoint
      remoteRef:
        key: "Application/example/default-secret"
        property: "RDS_WRITER_ENDPOINT"
    - secretKey: password
      remoteRef:
        key: "rds!cluster-example"
        property: "password"
    - secretKey: username
      remoteRef:
        key: "rds!cluster-example"
        property: "username"
    - secretKey: s3_access_key
      remoteRef:
        key: "Application/example/default-secret"
        property: "S3_ACCESS_KEY"
    - secretKey: s3_secret
      remoteRef:
        key: "Application/example/default-secret"
        property: "S3_SECRET"
ingress:
  enabled: true
  groupName: prod-use1-web-eks-public
  internet: true
  annotations:
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-FIPS-PQ-2025-09
    
