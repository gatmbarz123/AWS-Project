default:
  requirements:
    - key: karpenter.k8s.aws/instance-category
      operator: In
      values:
      - t
      - r
      - c
      - m 
    - key: karpenter.k8s.aws/instance-size
      operator: In
      values:
      - medium
      - large
      - xlarge
      - 2xlarge
      - 3xlarge
    - key: "karpenter.sh/capacity-type"
      operator: In
      values:
      - "on-demand"
    - key: "kubernetes.io/arch"
      operator: In
      values:
      - "amd64"
    - key: "kubernetes.io/os"
      operator: In
      values:
      - "linux"
