replicas: 1
tolerations:
  - key: "role"
    operator: "Equal"
    value: "karpenter"
  - key: "CriticalAddonsOnly"
    operator: "Exists"

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: "role"
          operator: "In"
          values:
          - "karpenter"

controller:
  resources:
    requests:
      cpu: 200m
      memory: 500Mi
    limits:
      cpu: 500m
      memory: 1Gi

serviceAccount:
  name: karpenter