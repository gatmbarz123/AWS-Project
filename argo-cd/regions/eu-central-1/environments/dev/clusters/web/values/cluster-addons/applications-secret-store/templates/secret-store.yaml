apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: applications-secretstore
  namespace: {{ .Values.namespace }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.global.region }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ .Values.serviceAccount.name }}
